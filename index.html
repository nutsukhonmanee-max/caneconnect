<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaneConnect - แอปพลิเคชันชาวไร่อ้อย</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

    <style>
        :root { --primary-green: #7cb342; --light-green: #f1f8e9; --dark-green: #558b2f; --text-dark: #333333; --bg-color: #fafafa; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-color); color: var(--text-dark); padding: 0; margin: 0; }
        .header { background-color: var(--primary-green); color: white; padding: 30px 20px 40px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 10px rgba(124, 179, 66, 0.3); }
        .header h1 { margin: 0; font-size: 28px; font-weight: 600; letter-spacing: 1px; }
        .speech-bubble { background: white; color: var(--dark-green); border-radius: 20px; padding: 10px 15px; font-size: 14px; display: inline-block; margin-top: 10px; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .container { background: #ffffff; padding: 25px 25px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); margin: -25px 20px 30px; position: relative; z-index: 10; }
        .profile-section { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed #e0e0e0; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--primary-green); margin-bottom: 10px; display: none; object-fit: cover; }
        .profile-text { color: var(--text-dark); font-size: 16px; font-weight: 500; }
        label { font-weight: 500; display: block; margin-top: 15px; font-size: 15px; color: #555; }
        input, textarea { width: 100%; padding: 14px; margin-top: 8px; border: 2px solid #e0e0e0; border-radius: 12px; box-sizing: border-box; font-size: 16px; font-family: 'Kanit', sans-serif; transition: all 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary-green); outline: none; box-shadow: 0 0 0 3px var(--light-green); }
        #map { height: 280px; width: 100%; border-radius: 12px; margin-top: 10px; border: 2px solid #e0e0e0; z-index: 1; }
        .status-box { margin-top: 10px; padding: 12px; border-radius: 12px; background-color: var(--light-green); color: var(--dark-green); font-size: 14px; display: flex; align-items: center; font-weight: 500; line-height: 1.4; }
        .status-box i { margin-right: 8px; font-size: 20px;}
        button { width: 100%; padding: 16px; margin-top: 25px; background-color: var(--primary-green); color: white; border: none; border-radius: 15px; font-size: 18px; font-family: 'Kanit', sans-serif; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(124, 179, 66, 0.4); transition: 0.2s; }
        button:disabled { background-color: #cccccc; box-shadow: none; cursor: not-allowed; }
        .page { display: none; }
        .page.active { display: block; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        
        /* สไตล์สำหรับหน้าการขายของฉัน */
        .section-title { font-size: 18px; font-weight: 600; color: var(--dark-green); border-bottom: 2px solid var(--primary-green); padding-bottom: 5px; margin-top: 20px; margin-bottom: 15px; }
        .sale-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .sale-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed #eee; }
        .sale-date { font-size: 13px; color: #777; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge.pending { background: #fff3cd; color: #856404; }       /* รอคิวรถ */
        .badge.processing { background: #cce5ff; color: #004085; }    /* กำลังดำเนินการ */
        .badge.completed { background: #d4edda; color: #155724; }     /* เสร็จสิ้น */
        .badge.canceled { background: #f8d7da; color: #721c24; }      /* ยกเลิก */
        .sale-detail { font-size: 14px; color: #444; line-height: 1.8; }
        .sale-detail span { font-weight: 600; color: #222; }
        .empty-state { text-align: center; color: #999; font-size: 14px; padding: 20px 0; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CaneConnect</h1>
        <div class="speech-bubble" id="header-text">กำลังโหลดข้อมูล...</div>
    </div>

    <div class="container">
        <div class="profile-section">
            <img id="profile-img" class="profile-img" src="" alt="Profile Image">
            <div class="profile-text" id="profile-info">กำลังเชื่อมต่อ LINE...</div>
        </div>

        <!-- ================= หน้าลงทะเบียน ================= -->
        <div id="register-page" class="page">
            <div class="status-box" id="reg-status-box" style="background-color: #fff3cd; color: #856404; margin-bottom: 20px;">
                <i>📝</i> กรุณากรอกข้อมูลเพื่อลงทะเบียนเข้าสู่ระบบครับ
            </div>
            <div class="row">
                <div><label>ชื่อ:</label><input type="text" id="reg-firstname" required></div>
                <div><label>นามสกุล:</label><input type="text" id="reg-lastname" required></div>
            </div>
            <label>เบอร์โทรศัพท์:</label><input type="tel" id="reg-phone" required>
            <label>ที่อยู่ปัจจุบัน:</label><textarea id="reg-address" rows="2" required></textarea>
            <label>ข้อมูลการปลูกอ้อย:</label><textarea id="reg-farminfo" rows="2"></textarea>
            <button id="btn-register" onclick="submitRegistration()">ยืนยันการลงทะเบียน</button>
        </div>

        <!-- ================= หน้าแจ้งพิกัดอ้อย ================= -->
        <div id="main-page" class="page">
            <label>📍 1. วาดกรอบแปลงอ้อยของคุณ:</label>
            <div class="status-box" id="gps-status" style="background-color: #e3f2fd; color: #1565c0;">
                <i>👆</i> กดปุ่มรูปห้าเหลี่ยมบนแผนที่ แล้ววาดตามขอบแปลง
            </div>
            <div id="map"></div>
            <label>🌱 2. ปริมาณใบอ้อย (ไร่):</label><input type="number" id="quantity" readonly>
            <label>🗓️ 3. วันที่ตัดอ้อยเสร็จ:</label><input type="date" id="harvest-date" required>
            <button id="submit-btn" onclick="submitCaneData()" disabled>ส่งข้อมูลแจ้งคิวรถ</button>
        </div>

        <!-- ================= หน้าการขายของฉัน (เพิ่มใหม่) ================= -->
        <div id="sales-page" class="page">
            <div class="section-title">📍 รายการที่กำลังดำเนินการ</div>
            <div id="current-sales-container"></div>

            <div class="section-title" style="margin-top: 30px;">ประวัติการขาย (เสร็จสิ้น/ยกเลิก)</div>
            <div id="history-sales-container"></div>
        </div>

    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const LIFF_ID = "2010423459-prdYAD4u"; 
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwKNL6jqjvtpuBxDzgqBIQiKLjA7_2QupvMAK9tcod5SlBbcs7iIbswlglT76xI5xOwng/exec";
        
        let userProfile = null;
        let currentLat = 17.295; let currentLng = 101.782; 
        let map; let drawnPolygon = null; let polygonGeoJSON = "";
        let isEditMode = false; 

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    userProfile = await liff.getProfile();
                    document.getElementById("profile-info").innerText = "คุณ " + userProfile.displayName;
                    document.getElementById("profile-img").src = userProfile.pictureUrl; 
                    document.getElementById("profile-img").style.display = "inline-block";

                    const urlParams = new URLSearchParams(window.location.search);
                    const mode = urlParams.get('mode');

                    if (mode === 'register') {
                        document.getElementById("header-text").innerText = "🌱 ข้อมูลชาวไร่";
                        document.getElementById("register-page").classList.add("active");
                        checkUserForRegister(); 
                    } else if (mode === 'report') {
                        checkUserForAction('report'); 
                    } else if (mode === 'sales') {
                        checkUserForAction('sales'); 
                    } else {
                        document.getElementById("header-text").innerText = "🌱 ยินดีต้อนรับ";
                        Swal.fire('ข้อแนะนำ', 'กรุณาใช้งานผ่านเมนูด้านล่างในแชท LINE เท่านั้นครับ', 'info');
                    }
                } else { liff.login(); }
            } catch (err) { document.getElementById("profile-info").innerText = "ไม่สามารถเชื่อมต่อ LINE ได้"; }
        }

        async function checkUserForRegister() {
            try {
                const res = await fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "checkUser", userId: userProfile.userId }) });
                const result = await res.json();
                if (result.status === "found") {
                    isEditMode = true;
                    document.getElementById("reg-firstname").value = result.data.firstName;
                    document.getElementById("reg-lastname").value = result.data.lastName;
                    document.getElementById("reg-phone").value = result.data.phone;
                    document.getElementById("reg-address").value = result.data.address;
                    document.getElementById("reg-farminfo").value = result.data.farmInfo;
                    document.getElementById("btn-register").innerText = "บันทึกการแก้ไขข้อมูล";
                    const statusBox = document.getElementById("reg-status-box");
                    statusBox.innerHTML = "<i>ℹ️</i> คุณลงทะเบียนแล้ว สามารถแก้ไขข้อมูลด้านล่างได้เลยครับ";
                    statusBox.style.backgroundColor = "#e3f2fd"; statusBox.style.color = "#1565c0";
                }
            } catch (error) { console.error(error); }
        }

        // เช็คผู้ใช้ก่อนให้เข้าหน้าแจ้งพิกัด หรือ หน้าประวัติการขาย
        async function checkUserForAction(targetAction) {
            Swal.fire({ title: 'กำลังดึงข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
            try {
                const res = await fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "checkUser", userId: userProfile.userId }) });
                const result = await res.json();
                
                if (result.status === "found") {
                    Swal.close();
                    if(targetAction === 'report') {
                        document.getElementById("header-text").innerText = "🌱 แจ้งพิกัดเก็บใบอ้อย";
                        document.getElementById("main-page").classList.add("active");
                        getLocation();
                    } else if (targetAction === 'sales') {
                        document.getElementById("header-text").innerText = "🌱 การขายของฉัน";
                        document.getElementById("sales-page").classList.add("active");
                        fetchSalesData(); // ดึงข้อมูลการขายมาโชว์
                    }
                } else {
                    Swal.fire({ icon: 'warning', title: 'ยังไม่ได้ลงทะเบียน', text: 'กรุณา "ลงทะเบียน" ก่อนเริ่มใช้งานครับ', confirmButtonColor: '#7cb342' })
                    .then(() => { liff.closeWindow(); });
                }
            } catch (error) { Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error'); }
        }

        // --- ระบบดึงข้อมูลการขายของฉัน ---
        async function fetchSalesData() {
            try {
                const res = await fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "getSales", userId: userProfile.userId }) });
                const result = await res.json();
                
                if (result.status === "success") {
                    renderSalesUI(result.data);
                }
            } catch (error) {
                document.getElementById("current-sales-container").innerHTML = "<div class='empty-state'>ไม่สามารถดึงข้อมูลได้</div>";
            }
        }

        function renderSalesUI(salesData) {
            const currentContainer = document.getElementById("current-sales-container");
            const historyContainer = document.getElementById("history-sales-container");
            currentContainer.innerHTML = ""; historyContainer.innerHTML = "";

            if (salesData.length === 0) {
                currentContainer.innerHTML = "<div class='empty-state'>คุณยังไม่มีรายการแจ้งคิวรถครับ</div>";
                historyContainer.innerHTML = "<div class='empty-state'>ยังไม่มีประวัติการขาย</div>";
                return;
            }

            salesData.forEach(item => {
                // จัดการรูปแบบวันที่
                const reqDate = new Date(item.timestamp).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
                const hDate = new Date(item.harvestDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
                
                // กำหนดสีของ Badge สถานะ
                let badgeClass = "pending";
                let statusText = item.status === "Pending" ? "รอคิวรถ" : item.status;
                
                if (statusText.includes("กำลัง")) badgeClass = "processing";
                if (statusText.includes("เสร็จ")) badgeClass = "completed";
                if (statusText.includes("ยกเลิก")) badgeClass = "canceled";

                const cardHTML = `
                    <div class="sale-card">
                        <div class="sale-header">
                            <span class="sale-date">📅 แจ้งเมื่อ: ${reqDate}</span>
                            <span class="badge ${badgeClass}">${statusText}</span>
                        </div>
                        <div class="sale-detail">
                            <div>ปริมาณประเมิน: <span>${item.quantity} ไร่</span></div>
                            <div>วันที่ตัดอ้อยเสร็จ: <span>${hDate}</span></div>
                            <div>ผู้รับซื้อ: <span>${item.buyer}</span></div>
                            <div>ราคา: <span>${item.price}</span></div>
                        </div>
                    </div>
                `;

                // แยกใส่คนละหน้าต่าง (กำลังดำเนินการ vs เสร็จ/ยกเลิก)
                if (badgeClass === "completed" || badgeClass === "canceled") {
                    historyContainer.innerHTML += cardHTML;
                } else {
                    currentContainer.innerHTML += cardHTML;
                }
            });

            if (currentContainer.innerHTML === "") currentContainer.innerHTML = "<div class='empty-state'>ไม่มีรายการที่กำลังดำเนินการ</div>";
            if (historyContainer.innerHTML === "") historyContainer.innerHTML = "<div class='empty-state'>ยังไม่มีประวัติการขายที่เสร็จสิ้น</div>";
        }

        // --- ส่วนที่เหลือ (ลงทะเบียน, แผนที่, บันทึกพิกัด) คงเดิม ---
        async function submitRegistration() {
            const fName = document.getElementById("reg-firstname").value; const lName = document.getElementById("reg-lastname").value;
            const phone = document.getElementById("reg-phone").value; const address = document.getElementById("reg-address").value; const farmInfo = document.getElementById("reg-farminfo").value;
            if(!fName || !lName || !phone || !address) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกข้อมูลส่วนตัวให้ครบถ้วนครับ', 'warning'); return; }
            const btn = document.getElementById("btn-register"); btn.innerText = "กำลังบันทึกข้อมูล..."; btn.disabled = true;
            const payload = { action: isEditMode ? "updateUser" : "register", userId: userProfile.userId, lineName: userProfile.displayName, firstName: fName, lastName: lName, phone: phone, address: address, farmInfo: farmInfo };
            try {
                const res = await fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) }); const result = await res.json();
                if (result.status === "success") { Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: isEditMode ? 'อัปเดตข้อมูลแล้ว' : 'ลงทะเบียนสำเร็จ!', confirmButtonColor: '#7cb342' }).then(() => { liff.closeWindow(); }); }
            } catch (error) { Swal.fire('ล้มเหลว', 'ไม่สามารถบันทึกข้อมูลได้', 'error'); btn.innerText = isEditMode ? "บันทึกการแก้ไขข้อมูล" : "ยืนยันการลงทะเบียน"; btn.disabled = false; }
        }

        function renderMap(lat, lng) {
            if(!map) {
                map = L.map('map').setView([lat, lng], 16);
                L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 20 }).addTo(map);
                map.pm.addControls({ position: 'topleft', drawMarker: false, drawCircleMarker: false, drawPolyline: false, drawRectangle: false, drawCircle: false, drawPolygon: true, editMode: true, dragMode: false, cutPolygon: false, removalMode: true });
                map.on('pm:create', function(e) { if (drawnPolygon) drawnPolygon.remove(); drawnPolygon = e.layer; calculateArea(drawnPolygon); drawnPolygon.on('pm:edit', function() { calculateArea(drawnPolygon); }); });
                map.on('pm:remove', function(e) { drawnPolygon = null; polygonGeoJSON = ""; document.getElementById("quantity").value = ""; document.getElementById("gps-status").innerHTML = "<i>👆</i> กดปุ่มรูปห้าเหลี่ยมบนแผนที่ แล้ววาดตามขอบแปลง"; document.getElementById("gps-status").style.backgroundColor = "#e3f2fd"; document.getElementById("gps-status").style.color = "#1565c0"; });
            } else { map.setView([lat, lng], 16); }
            document.getElementById("submit-btn").disabled = false;
        }

        function calculateArea(layer) {
            let geojson = layer.toGeoJSON(); polygonGeoJSON = JSON.stringify(geojson.geometry.coordinates);
            let areaRai = (turf.area(geojson) / 1600).toFixed(2);
            let center = turf.centerOfMass(geojson); currentLat = center.geometry.coordinates[1]; currentLng = center.geometry.coordinates[0];
            document.getElementById("quantity").value = areaRai; document.getElementById("gps-status").innerHTML = "<i>✅</i> วาดสำเร็จ! พื้นที่ประเมิน: <b>" + areaRai + " ไร่</b>"; document.getElementById("gps-status").style.backgroundColor = "#f0fdf4"; document.getElementById("gps-status").style.color = "#27ae60";
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => { currentLat = position.coords.latitude; currentLng = position.coords.longitude; renderMap(currentLat, currentLng); }, (error) => { renderMap(currentLat, currentLng); Swal.fire('ข้อแนะนำ', 'กรุณาเลื่อนแผนที่ไปหาแปลงอ้อยของคุณด้วยตนเองครับ', 'info'); }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
            } else { renderMap(currentLat, currentLng); }
        }

        async function submitCaneData() {
            const qty = document.getElementById("quantity").value; const hDate = document.getElementById("harvest-date").value;
            if(!drawnPolygon) { Swal.fire('ลืมวาดแปลงอ้อย', 'กรุณาวาดขอบเขตแปลงอ้อยในแผนที่ก่อนครับ', 'warning'); return; }
            if(!hDate) { Swal.fire('ลืมระบุวันที่', 'กรุณาระบุวันที่คาดว่าจะตัดอ้อยเสร็จด้วยนะครับ', 'warning'); return; }
            const btn = document.getElementById("submit-btn"); btn.innerText = "กำลังจัดส่งข้อมูล..."; btn.disabled = true;
            const payload = { action: "report_harvest", userId: userProfile.userId, userName: userProfile.displayName, latitude: currentLat, longitude: currentLng, quantity: Number(qty), harvestDate: hDate, polygon: polygonGeoJSON };
            try {
                const res = await fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) }); const result = await res.json();
                if (result.status === "success") { Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', text: 'ระบบได้รับพิกัดของคุณเรียบร้อยแล้ว', confirmButtonColor: '#7cb342' }).then(() => { liff.closeWindow(); }); }
            } catch (error) { Swal.fire('ล้มเหลว', 'ไม่สามารถส่งข้อมูลได้', 'error'); } finally { btn.innerText = "ส่งข้อมูลแจ้งคิวรถ"; btn.disabled = false; }
        }

        window.onload = main;
    </script>
</body>
</html>
